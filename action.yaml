---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

name: "ONAP Release Map"
description: "Generate ONAP release component manifest from OOM Helm charts"

inputs:
  oom-path:
    description: "Path to local OOM repository clone"
    required: true
  release-name:
    description: "ONAP release code name"
    required: false
    default: "Rabat"
  output-dir:
    description: "Output directory for manifest files"
    required: false
    default: "./output"
  output-format:
    # yamllint disable-line rule:line-length
    description: "Output format: json, yaml, all (non-json values are treated as all)"
    required: false
    default: "json"
  mapping-file:
    description: "Custom image-to-repo mapping YAML override"
    required: false
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"

outputs:
  manifest-path:
    description: "Path to the generated manifest JSON file"
    value: ${{ steps.run-tool.outputs.manifest_path }}
  repository-count:
    description: "Number of repositories in the manifest"
    value: ${{ steps.run-tool.outputs.repository_count }}
  image-count:
    description: "Number of Docker images in the manifest"
    value: ${{ steps.run-tool.outputs.image_count }}

runs:
  using: "composite"
  steps:
    - name: "Set up Python"
      # yamllint disable-line rule:line-length
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: "${{ inputs.python-version }}"

    - name: "Install onap-release-map"
      shell: bash
      run: |
        # Install onap-release-map
        # When used as a GitHub Action the checkout has no .git directory,
        # so hatch-vcs cannot resolve the version dynamically.  The
        # fallback-version configured in pyproject.toml handles this case.
        python -m pip install --quiet "${{ github.action_path }}"

    - name: "Run onap-release-map discover"
      id: run-tool
      shell: bash
      # yamllint disable rule:line-length
      run: |
        # Run onap-release-map discover
        # Always include JSON so outputs can be parsed
        FORMAT="${{ inputs.output-format }}"
        if [ "$FORMAT" != "json" ] && [ "$FORMAT" != "all" ]; then
          FORMAT="all"
        fi

        ARGS=(discover)
        ARGS+=(--oom-path "${{ inputs.oom-path }}")
        ARGS+=(--output-dir "${{ inputs.output-dir }}")
        ARGS+=(--output-format "$FORMAT")
        ARGS+=(--release-name "${{ inputs.release-name }}")

        if [ -n "${{ inputs.mapping-file }}" ]; then
          ARGS+=(--mapping-file "${{ inputs.mapping-file }}")
        fi

        onap-release-map "${ARGS[@]}"

        # Set outputs from the JSON manifest
        MANIFEST="${{ inputs.output-dir }}/manifest.json"
        if [ -f "$MANIFEST" ]; then
          echo "manifest_path=$MANIFEST" >> "$GITHUB_OUTPUT"
          REPO_COUNT=$(python3 -c "import json; m = json.load(open('$MANIFEST')); print(m.get('summary', {}).get('total_repositories', 0))")
          IMAGE_COUNT=$(python3 -c "import json; m = json.load(open('$MANIFEST')); print(m.get('summary', {}).get('total_docker_images', 0))")
          echo "repository_count=$REPO_COUNT" >> "$GITHUB_OUTPUT"
          echo "image_count=$IMAGE_COUNT" >> "$GITHUB_OUTPUT"
        fi
      # yamllint enable rule:line-length

    - name: "Summary"
      shell: bash
      # yamllint disable rule:line-length
      run: |
        # Summary
        {
          echo "## ONAP Release Map Results"
          echo ""
          echo "| Metric | Value |"
          echo "| ------ | ----- |"
          echo "| Repositories | ${{ steps.run-tool.outputs.repository_count }} |"
          echo "| Docker Images | ${{ steps.run-tool.outputs.image_count }} |"
          echo "| Release | ${{ inputs.release-name }} |"
          echo "| Output | ${{ inputs.output-dir }} |"
        } >> "$GITHUB_STEP_SUMMARY"
      # yamllint enable rule:line-length
