# Default configuration for onap-release-map

# ONAP Gerrit server
gerrit:
  url: "https://gerrit.onap.org/r"
  timeout: 30
  max_retries: 3
  states:
    - "ACTIVE"

# OOM repository
oom:
  default_branch: "master"
  remote_url: "https://gerrit.onap.org/r/oom"
  exclude_dirs:
    - "argo"
    - "archive"

# Collectors to enable by default
collectors:
  - oom

# Repository filtering
filter_repos:
  - ".github"
  - "All-Projects"
  - "All-Users"
  # ci-management contains JJB (Jenkins Job Builder) CI job definitions
  # for the ONAP Jenkins instance, not runtime release content.
  - "ci-management"

# Exclude read-only/archived Gerrit projects
exclude_readonly: true

# Output settings
output:
  formats:
    - json
  deterministic: true
  pretty_print: true
  indent: 2

# Nexus registry for validation
nexus:
  url: "https://nexus3.onap.org:10001"
  timeout: 10
  max_retries: 3
  concurrent_workers: 4

# Logging
logging:
  level: "INFO"
  format: "rich"
