# Action test/validation workflow
name: "Test GitHub Action"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  tests:
    name: "Test local GitHub Action"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: "Checkout repository"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: "Create minimal OOM structure"
        shell: bash
        run: |
          # Create minimal OOM structure for testing
          mkdir -p oom/kubernetes/onap
          cat > oom/kubernetes/onap/Chart.yaml << 'EOF'
          apiVersion: v2
          name: onap
          version: 0.0.0-test
          description: Test chart
          dependencies: []
          EOF

      - name: "Run local action"
        uses: ./
        with:
          oom-path: "./oom"
          release-name: "Test"
          output-dir: "./output"

      - name: "Verify manifest was created"
        shell: bash
        run: |
          # Verify manifest was created
          if [ -f "./output/manifest.json" ]; then
            echo "Manifest created successfully"
            cat ./output/manifest.json | python3 -m json.tool
          else
            echo "Error: manifest.json not found"
            exit 1
          fi
