---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

name: "ONAP Release Map"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      oom_branch:
        description: "OOM branch to analyze"
        type: string
        required: false
        default: "master"
      collectors:
        # Available: oom, gerrit, relman, jjb
        # relman and jjb need ci-management and release-management
        # checkouts which are cloned in dedicated steps below.
        description: "Collectors to enable (oom,gerrit,relman,jjb)"
        type: string
        required: false
        default: "oom,gerrit,relman,jjb"
      nexus_url:
        description: "Nexus3 registry URL for image verification"
        type: string
        required: false
        default: "https://nexus3.onap.org:10001"
      skip_pages:
        description: "Skip GitHub Pages update"
        type: boolean
        required: false
        default: false
      skip_artifacts:
        description: "Skip artifact transfer"
        type: boolean
        required: false
        default: false
      skip_nexus:
        description: "Skip Nexus image verification"
        type: boolean
        required: false
        default: false
      filter_repos:
        description: "Comma-separated Gerrit projects to exclude"
        type: string
        required: false
        default: ""
      exclude_readonly:
        description: "Exclude read-only/archived Gerrit projects"
        type: boolean
        required: false
        default: true
      version:
        description: "Tool version (e.g. '0.1.0' or 'latest')"
        type: string
        required: false
        default: "latest"
      from_source:
        # When true, install the tool directly from the repository
        # checkout at the current branch's HEAD instead of pulling a
        # released wheel from PyPI. Useful for verifying unreleased
        # changes end-to-end before cutting a new release. The
        # ``version`` input is ignored when this is set.
        description: "Install from repository checkout (ignores 'version')"
        type: boolean
        required: false
        default: false
      debug:
        description: "Enable debug output"
        type: boolean
        required: false
        default: false

concurrency:
  group: "mapping-production"
  cancel-in-progress: false

permissions: {}

jobs:
  analyze:
    name: "Analyze"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    outputs:
      manifest_date: "${{ steps.set-outputs.outputs.manifest_date }}"
      onap_release: "${{ steps.set-outputs.outputs.onap_release }}"
      total_repos: "${{ steps.set-outputs.outputs.total_repos }}"
      total_images: "${{ steps.set-outputs.outputs.total_images }}"
    steps:
      - name: "Harden runner"
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: "Checkout repository"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: "Setup Python"
        # yamllint disable-line rule:line-length
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: "Install uv"
        # yamllint disable-line rule:line-length
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: "Resolve tool specifier"
        # Pass workflow_dispatch inputs through the step ``env`` map
        # rather than interpolating ``${{ inputs.* }}`` directly into
        # the bash script. ``${{ ... }}`` interpolation happens before
        # the runner even starts a shell, so a hostile operator who
        # supplied an input containing command substitution
        # (``$(...)``, backticks) would have that executed verbatim.
        # Reading from ``$FROM_SOURCE`` / ``$VERSION`` instead treats
        # the inputs as data, which bash quotes expand safely.
        env:
          FROM_SOURCE: "${{ inputs.from_source }}"
          VERSION: "${{ inputs.version }}"
        run: |
          # Build uvx specifier. When `from_source` is true, point
          # uvx at the repository checkout so unreleased changes on
          # the current branch flow through end-to-end. Otherwise
          # resolve against PyPI using the optional version pin.
          if [ "$FROM_SOURCE" = "true" ]; then
            # `uvx --from <path>` installs the project at that path
            # into an ephemeral environment and runs its entrypoint.
            # The `onap-release-map` argument after `--from` is the
            # console script name that uvx should invoke.
            TOOL_SPEC=(--from "${GITHUB_WORKSPACE}" onap-release-map)
            echo "Running from source checkout at ${GITHUB_WORKSPACE}"
          elif [ "$VERSION" = "latest" ] || [ -z "$VERSION" ]; then
            TOOL_SPEC=(onap-release-map)
          else
            TOOL_SPEC=(onap-release-map@"${VERSION}")
          fi
          # Persist the specifier using GitHub Actions' multi-line
          # env var heredoc form so later steps can rebuild the
          # argument array identically, with one array element per
          # line in the stored value. The single grouped redirect
          # satisfies shellcheck SC2129 and avoids three separate
          # open/append operations on the env file.
          {
            printf 'TOOL_SPEC<<EOF\n'
            printf '%s\n' "${TOOL_SPEC[@]}"
            printf 'EOF\n'
          } >> "$GITHUB_ENV"
          echo "::group::Tool version"
          uvx "${TOOL_SPEC[@]}" version
          echo "::endgroup::"

      - name: "Clone OOM from Gerrit"
        # Pass ``inputs.oom_branch`` through the step ``env`` map
        # rather than interpolating it directly into the bash
        # script. ``${{ ... }}`` expansion happens before the shell
        # starts, so a hostile operator could otherwise inject
        # arbitrary commands via an input containing ``$(...)`` or
        # backticks. Reading ``$OOM_BRANCH`` treats it as data.
        # ``GERRIT_URL`` is sourced from a repository variable, but
        # is routed through ``env`` for the same reason: a value
        # containing shell metacharacters would otherwise be
        # expanded by bash even inside double quotes.
        env:
          OOM_BRANCH: "${{ inputs.oom_branch }}"
          GERRIT_URL: "${{ vars.GERRIT_URL || 'https://gerrit.onap.org/r' }}"
        run: |
          # Clone OOM (sparse checkout of kubernetes/ only)
          git clone --depth 1 --branch "${OOM_BRANCH}" \
            --single-branch --filter=blob:none --no-checkout \
            "${GERRIT_URL}/oom" \
            "${{ runner.temp }}/oom"
          cd "${{ runner.temp }}/oom"
          git sparse-checkout init --cone
          git sparse-checkout set kubernetes
          git checkout

      - name: "Clone ci-management from Gerrit"
        # ``GERRIT_URL`` is routed through ``env`` so that any shell
        # metacharacters in the repository variable cannot be
        # expanded/executed by bash at runtime.
        env:
          GERRIT_URL: "${{ vars.GERRIT_URL || 'https://gerrit.onap.org/r' }}"
        run: |
          # Clone ci-management (sparse checkout of jjb/ only)
          git clone --depth 1 --branch master \
            --single-branch --filter=blob:none --no-checkout \
            "${GERRIT_URL}/ci-management" \
            "${{ runner.temp }}/ci-management"
          cd "${{ runner.temp }}/ci-management"
          git sparse-checkout init --cone
          git sparse-checkout set jjb
          git checkout

      - name: "Clone relman from Gerrit"
        # ``GERRIT_URL`` is routed through ``env`` so that any shell
        # metacharacters in the repository variable cannot be
        # expanded/executed by bash at runtime.
        env:
          GERRIT_URL: "${{ vars.GERRIT_URL || 'https://gerrit.onap.org/r' }}"
        run: |
          # Clone relman for repos/repos.yaml
          git clone --depth 1 --branch master \
            --single-branch --filter=blob:none \
            "${GERRIT_URL}/relman" \
            "${{ runner.temp }}/relman"

      - name: "Run discover"
        # Route every ``workflow_dispatch`` input that lands in the
        # bash script through the step ``env`` map. ``${{ ... }}``
        # interpolation happens before the runner starts a shell,
        # so values containing ``$(...)``/backticks would otherwise
        # execute verbatim. The variables below are all consumed as
        # data via ordinary shell parameter expansion.
        env:
          OOM_BRANCH: "${{ inputs.oom_branch }}"
          COLLECTORS: "${{ inputs.collectors }}"
          FILTER_REPOS: "${{ inputs.filter_repos }}"
          EXCLUDE_READONLY: "${{ inputs.exclude_readonly }}"
          DEBUG: "${{ inputs.debug }}"
          GERRIT_URL: "${{ vars.GERRIT_URL || 'https://gerrit.onap.org/r' }}"
        run: |
          # Run release mapping discovery
          # Capitalize the first character of the branch name to
          # form the release name (e.g. ``master`` -> ``Master``).
          # Using bash parameter expansion avoids an unnecessary
          # subshell and sed invocation (shellcheck SC2001).
          RELEASE_NAME="${OOM_BRANCH^}"
          ARGS=(discover)
          ARGS+=(--oom-path "${{ runner.temp }}/oom")
          ARGS+=(--output-dir "${{ runner.temp }}/output")
          ARGS+=(--output-format all)
          ARGS+=(--release-name "${RELEASE_NAME}")
          ARGS+=(--collectors "${COLLECTORS}")
          ARGS+=(--gerrit-url "${GERRIT_URL}")
          ARGS+=(--jjb-path "${{ runner.temp }}/ci-management/jjb")
          ARGS+=(--repos-yaml "${{ runner.temp }}/relman/repos/repos.yaml")
          if [ -n "${FILTER_REPOS}" ]; then
            ARGS+=(--filter-repos "${FILTER_REPOS}")
          fi
          if [ "${EXCLUDE_READONLY}" = "false" ]; then
            ARGS+=(--no-exclude-readonly)
          fi
          if [ "${DEBUG}" = "true" ] || \
             [ "${RUNNER_DEBUG:-0}" = "1" ] || \
             [ "${ACTIONS_STEP_DEBUG:-false}" = "true" ]; then
            ARGS+=(--verbose -v)
          fi
          # Rebuild the specifier array from the multi-line env var
          # written by the "Resolve tool specifier" step. The same
          # reconstruction appears in every step that invokes uvx.
          mapfile -t TOOL_SPEC <<< "${TOOL_SPEC}"
          uvx "${TOOL_SPEC[@]}" "${ARGS[@]}"

      - name: "Verify images on Nexus"
        if: inputs.skip_nexus != true
        # See the "Resolve tool specifier" step for the rationale
        # behind passing inputs via ``env`` rather than ``${{ }}``.
        env:
          NEXUS_URL: "${{ inputs.nexus_url }}"
        run: |
          # Validate Docker images exist in Nexus registry
          # Runs before export so results appear in reports
          MANIFEST="${{ runner.temp }}/output/manifest.json"
          if [ -f "$MANIFEST" ]; then
            mapfile -t TOOL_SPEC <<< "${TOOL_SPEC}"
            uvx "${TOOL_SPEC[@]}" verify "$MANIFEST" \
              --nexus-url "${NEXUS_URL}"
          fi

      - name: "Export additional formats"
        # See the "Resolve tool specifier" step for the rationale
        # behind passing inputs via ``env`` rather than ``${{ }}``.
        env:
          FILTER_REPOS: "${{ inputs.filter_repos }}"
          EXCLUDE_READONLY: "${{ inputs.exclude_readonly }}"
        run: |
          # Generate Markdown, CSV, and HTML from manifest
          MANIFEST="${{ runner.temp }}/output/manifest.json"
          if [ -f "$MANIFEST" ]; then
            EXPORT_ARGS=()
            if [ -n "${FILTER_REPOS}" ]; then
              EXPORT_ARGS+=(--filter-repos "${FILTER_REPOS}")
            fi
            if [ "${EXCLUDE_READONLY}" = "false" ]; then
              EXPORT_ARGS+=(--no-exclude-readonly)
            fi
            mapfile -t TOOL_SPEC <<< "${TOOL_SPEC}"
            uvx "${TOOL_SPEC[@]}" export "$MANIFEST" \
              --format md \
              --output "${{ runner.temp }}/output/manifest.md" \
              "${EXPORT_ARGS[@]}"
            uvx "${TOOL_SPEC[@]}" export "$MANIFEST" \
              --format csv \
              --output "${{ runner.temp }}/output/manifest.csv" \
              "${EXPORT_ARGS[@]}"
            uvx "${TOOL_SPEC[@]}" export "$MANIFEST" \
              --format html \
              --output "${{ runner.temp }}/output/manifest.html" \
              "${EXPORT_ARGS[@]}"
          fi

      - name: "Create metadata.json"
        # See the "Resolve tool specifier" step for the rationale
        # behind passing inputs via ``env`` rather than ``${{ }}``.
        # Building the JSON document with ``jq -n --arg`` ensures
        # every operator-supplied value is structurally escaped
        # (quotes, backslashes, newlines, control characters), so
        # the resulting file is always valid JSON regardless of
        # input content and no value can inject extra fields.
        env:
          OOM_BRANCH: "${{ inputs.oom_branch }}"
          COLLECTORS: "${{ inputs.collectors }}"
        run: |
          # Create run provenance metadata
          mapfile -t TOOL_SPEC <<< "${TOOL_SPEC}"
          TOOL_VERSION="$(uvx "${TOOL_SPEC[@]}" version 2>&1 | head -1)"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          jq -n \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg run_url "${RUN_URL}" \
            --arg triggered_by "${GITHUB_ACTOR}" \
            --arg oom_branch "${OOM_BRANCH}" \
            --arg collectors "${COLLECTORS}" \
            --arg timestamp "${TIMESTAMP}" \
            --arg tool_version "${TOOL_VERSION}" \
            '{
              run_id: $run_id,
              run_url: $run_url,
              triggered_by: $triggered_by,
              oom_branch: $oom_branch,
              collectors: $collectors,
              timestamp: $timestamp,
              tool_version: $tool_version
            }' > "${{ runner.temp }}/output/metadata.json"

      - name: "Set outputs"
        id: set-outputs
        # yamllint disable rule:line-length
        run: |
          # Parse manifest.json for job outputs
          MANIFEST="${{ runner.temp }}/output/manifest.json"
          manifest_date=$(date -u +%Y-%m-%d)
          onap_release=$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["onap_release"]["name"])' "$MANIFEST")
          total_repos=$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["summary"]["total_repositories"])' "$MANIFEST")
          total_images=$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["summary"]["total_docker_images"])' "$MANIFEST")
          {
            echo "manifest_date=$manifest_date"
            echo "onap_release=$onap_release"
            echo "total_repos=$total_repos"
            echo "total_images=$total_images"
          } >> "$GITHUB_OUTPUT"
        # yamllint enable rule:line-length

      - name: "Upload manifest artifact"
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: manifest
          path: "${{ runner.temp }}/output"
          retention-days: 90

      - name: "Upload metadata artifact"
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: metadata
          path: "${{ runner.temp }}/output/metadata.json"
          retention-days: 90

  publish-pages:
    name: "Publish Pages"
    needs: analyze
    if: inputs.skip_pages != true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - name: "Harden runner"
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: "Checkout gh-pages branch"
        # yamllint disable rule:line-length
        run: |
          # Clone gh-pages branch (create if missing)
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git clone --single-branch --branch gh-pages \
            "${REPO_URL}" gh-pages 2>/dev/null || {
            mkdir gh-pages && cd gh-pages && git init
            git remote add origin "${REPO_URL}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout --orphan gh-pages
            git commit --allow-empty -m "Init gh-pages"
          }
        # yamllint enable rule:line-length

      - name: "Checkout repository"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          path: repo

      - name: "Download manifest artifact"
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: manifest
          path: manifest

      - name: "Copy files to gh-pages"
        run: |
          # Copy manifest to date-stamped and latest dirs
          DATE="${{ needs.analyze.outputs.manifest_date }}"
          mkdir -p "gh-pages/${DATE}" "gh-pages/latest"
          rm -rf "gh-pages/${DATE:?}"/*
          cp -r manifest/* "gh-pages/${DATE}/"
          rm -rf gh-pages/latest/*
          cp -r manifest/* "gh-pages/latest/"

      - name: "Generate index"
        run: bash repo/.github/scripts/generate-index.sh gh-pages

      - name: "Commit and push"
        run: |
          # Commit and push gh-pages updates
          DATE="${{ needs.analyze.outputs.manifest_date }}"
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email \
            "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || {
            git commit -m "Update mapping: ${DATE}"
            git push origin gh-pages
          }

  copy-to-artifacts-repo:
    name: "Copy to Artifacts Repo"
    needs: analyze
    if: inputs.skip_artifacts != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: "Harden runner"
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: "Checkout repository"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: "Download manifest artifact"
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: manifest
          path: manifest

      - name: "Download metadata artifact"
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: metadata
          path: metadata

      - name: "Copy artifacts"
        env:
          GITHUB_REPOSITORY_OWNER: "${{ github.repository_owner }}"
        run: |
          # Run copy-artifacts script
          bash .github/scripts/copy-artifacts.sh \
            "${{ needs.analyze.outputs.manifest_date }}" \
            "${{ secrets.ARTIFACTS_REPO_TOKEN }}"

  summary:
    name: "Summary"
    needs: [analyze, publish-pages, copy-to-artifacts-repo]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Generate summary"
        # yamllint disable rule:line-length
        run: |
          # Generate workflow summary
          PAGES="https://modeseven-lfit.github.io"
          PAGES="${PAGES}/onap-release-mapping-tool"
          {
            echo "## Release Mapping Production Summary"
            echo ""
            echo "### Analyze Results"
            echo ""
            echo "| Metric | Value |"
            echo "| ------ | ----- |"
            echo "| **Date** | \
          ${{ needs.analyze.outputs.manifest_date }} |"
            echo "| **ONAP Release** | \
          ${{ needs.analyze.outputs.onap_release }} |"
            echo "| **Total Repos** | \
          ${{ needs.analyze.outputs.total_repos }} |"
            echo "| **Total Images** | \
          ${{ needs.analyze.outputs.total_images }} |"
            echo ""
            echo "### Job Status"
            echo ""
            echo "| Job | Status |"
            echo "| --- | ------ |"
            echo "| Analyze | \
          ${{ needs.analyze.result }} |"
            echo "| Publish Pages | \
          ${{ needs.publish-pages.result }} |"
            echo "| Copy to Artifacts Repo | \
          ${{ needs.copy-to-artifacts-repo.result }} |"
            echo ""
            echo "### Published Links"
            echo ""
            echo "| Link | URL |"
            echo "| ---- | --- |"
            echo "| **GitHub Pages** | ${PAGES}/ |"
            echo "| **Latest Report** | \
          ${PAGES}/latest/manifest.html |"
            echo "| **Latest JSON** | \
          ${PAGES}/latest/manifest.json |"
          } >> "$GITHUB_STEP_SUMMARY"
        # yamllint enable rule:line-length
